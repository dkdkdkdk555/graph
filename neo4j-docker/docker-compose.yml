version: '3.8'

services:
  neo4j:
    image: neo4j:5.26.0
    container_name: neo4j5
    ports:
      - "7474:7474"  # 브라우저
      - "7687:7687"  # Bolt (Python 연결)
    environment:
      - NEO4J_AUTH=neo4j/dnrgus2022@@
      - NEO4J_PLUGINS=["apoc","graph-data-science"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*,gds.*
      - NEO4J_dbms_security_procedures_allowlist=apoc.*,gds.*
    volumes:
      - ./data:/data        # 데이터 영구 저장
      - ./logs:/logs        # 로그 저장
      - ./plugins:/plugins  # 플러그인 저장
    restart: always